<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>빛의 계절 — 참여 작가</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --white: #ffffff;
  --ink: #222222;
  --ink-2: #333333;
  --meta: #9a9a9a;
  --line: #e8e8e8;
  --hint: #bbbbbb;
}

body {
  background: var(--white);
  color: var(--ink);
  font-family: 'Pretendard', -apple-system, sans-serif;
  font-weight: 400;
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
}

/* ── HEADER ── */
.site-header {
  padding: 40px 48px 0;
  display: flex;
  align-items: baseline;
  gap: 20px;
  border-bottom: 1px solid var(--line);
  padding-bottom: 24px;
}
.site-title {
  font-size: 15px;
  font-weight: 500;
  letter-spacing: 0.02em;
  color: var(--ink);
}
.site-sub {
  font-size: 12px;
  color: var(--meta);
  letter-spacing: 0.04em;
  font-weight: 300;
}

/* ── GRID ── */
.section-artists {
  padding: 40px 48px 64px;
}

.artists-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 32px 24px;
}

.artist-wrapper {
  cursor: pointer;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.artist-img-wrap {
  position: relative;
  width: 100%;
  aspect-ratio: 3 / 4;
  overflow: hidden;
  border-radius: 4px;
  background: #f4f4f4;
}

.artist-img-wrap img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
  transition: transform 0.5s ease;
}

.artist-wrapper:hover .artist-img-wrap img {
  transform: scale(1.02);
}

.artist-meta {
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.artist-meta-name {
  font-size: 13px;
  font-weight: 500;
  color: var(--ink);
  letter-spacing: 0.01em;
}

.artist-meta-title {
  font-size: 12px;
  color: var(--meta);
  font-weight: 300;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

/* ── MODAL OVERLAY ── */
#cardOverlay {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 999;
  background: rgba(255,255,255,0.96);
  align-items: flex-start;
  justify-content: center;
  overflow-y: auto;
}
#cardOverlay.active { display: flex; }

/* ── MODAL INNER ── */
.modal-inner {
  width: min(720px, 94vw);
  padding: 60px 0 80px;
  display: flex;
  flex-direction: column;
  gap: 0;
}

/* Close & Nav row */
.modal-topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 40px;
}

.modal-nav {
  display: flex;
  align-items: center;
  gap: 24px;
}

.modal-nav-btn {
  background: none;
  border: none;
  cursor: pointer;
  font-size: 20px;
  color: var(--meta);
  padding: 4px;
  line-height: 1;
  transition: color 0.2s;
  font-family: 'Pretendard', sans-serif;
  font-weight: 300;
}
.modal-nav-btn:hover { color: var(--ink); }

.modal-close-btn {
  background: none;
  border: none;
  cursor: pointer;
  font-size: 18px;
  color: var(--meta);
  padding: 4px 8px;
  line-height: 1;
  transition: color 0.2s;
  font-family: 'Pretendard', sans-serif;
  font-weight: 300;
  letter-spacing: 0.04em;
}
.modal-close-btn:hover { color: var(--ink); }

.modal-counter {
  font-size: 11px;
  color: var(--hint);
  letter-spacing: 0.06em;
  font-weight: 300;
}

/* ── IMAGE AREA ── */
.modal-image-wrap {
  position: relative;
  width: 100%;
  aspect-ratio: 10 / 3; 
  background: #f8f8f8;
  border-radius: 6px;
  overflow: hidden;
  cursor: pointer;
}
.modal-image-wrap img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}
#modalVideo {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}

/* 영상 모드 확장 */
.modal-image-wrap.video-mode {
  aspect-ratio: auto;
  height: 72vh;
  background: #000;
}

/* loading overlay */
.modal-loading {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  background: rgba(248,248,248,0.8);
  display: none;
}
.modal-loading-text {
  font-size: 11px;
  color: var(--hint);
  letter-spacing: 0.08em;
  font-weight: 300;
}

/* video hint */
.modal-video-hint {
  margin-top: 10px;
  text-align: right;
  font-size: 10px;
  color: var(--hint);
  letter-spacing: 0.05em;
  font-weight: 300;
}

/* ── TEXT AREA ── */
.modal-text-area {
  margin-top: 32px;
  display: flex;
  flex-direction: column;
  gap: 0;
}

.modal-artist-name {
  font-size: 13px;
  font-weight: 400;
  color: var(--meta);
  letter-spacing: 0.04em;
  margin-bottom: 8px;
}

.modal-artwork-title {
  font-size: 22px;
  font-weight: 500;
  color: var(--ink);
  letter-spacing: -0.01em;
  line-height: 1.3;
  margin-bottom: 12px;
}

.modal-artwork-meta {
  display: flex;
  flex-direction: column;
  gap: 2px;
  margin-bottom: 28px;
}

.modal-artwork-meta span {
  font-size: 12px;
  color: var(--meta);
  font-weight: 300;
  letter-spacing: 0.02em;
  line-height: 1.7;
}

.modal-divider {
  width: 100%;
  height: 1px;
  background: var(--line);
  margin-bottom: 24px;
}

.modal-desc {
  font-size: 15px;
  color: var(--ink-2);
  font-weight: 400;
  line-height: 2;
  letter-spacing: 0.01em;
  white-space: pre-line;
  word-break: keep-all;
}

/* ── DOWNLOAD BTN ── */
.modal-download {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  margin-top: 36px;
  padding: 9px 20px;
  border: 1px solid #d0d0d0;
  background: none;
  text-decoration: none;
  color: var(--ink);
  font-family: 'Pretendard', sans-serif;
  font-size: 12px;
  font-weight: 400;
  letter-spacing: 0.04em;
  border-radius: 2px;
  transition: border-color 0.2s, background 0.2s;
  align-self: flex-start;
}
.modal-download:hover {
  border-color: var(--ink);
  background: #f8f8f8;
}

/* ── FOOTER ── */
footer {
  border-top: 1px solid var(--line);
  padding: 20px 48px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.footer-title {
  font-size: 12px;
  font-weight: 500;
  color: var(--ink);
  letter-spacing: 0.04em;
}
.footer-copy {
  font-size: 11px;
  color: var(--meta);
  font-weight: 300;
  letter-spacing: 0.02em;
}

/* ── RESPONSIVE ── */
@media (max-width: 900px) {
  .artists-grid { grid-template-columns: repeat(3, 1fr); }
  .site-header { padding: 28px 24px 20px; }
  .section-artists { padding: 32px 24px 48px; }
  footer { padding: 18px 24px; }
}
@media (max-width: 600px) {
  .artists-grid { grid-template-columns: repeat(2, 1fr); gap: 20px 14px; }
  .modal-inner { padding: 20px 0 40px; width: 92vw; }
  .modal-topbar { margin-bottom: 16px; }
  .modal-image-wrap img,
  #modalVideo { max-height: 44vh; }
  .modal-text-area { margin-top: 20px; }
  .modal-artist-name { font-size: 12px; margin-bottom: 4px; }
  .modal-artwork-title { font-size: 17px; margin-bottom: 8px; }
  .modal-artwork-meta { margin-bottom: 16px; }
  .modal-artwork-meta span { font-size: 11px; }
  .modal-divider { margin-bottom: 16px; }
  .modal-desc { font-size: 13px; line-height: 1.9; }
  .modal-download { margin-top: 24px; padding: 8px 16px; font-size: 11px; }
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }
}
.section-artists { animation: fadeIn 0.6s ease 0.1s both; }
</style>
</head>

  { number: "03", name: "김병희", img: "images/03_김병희.jpg", video: "images/03_김병희.mp4", highres: "images/03_김병희.jpg",

    title: "쉼",

    size: "90.9 × 72.7cm 외",
    year: "2026",
    desc: "우리는 가끔 낯선 곳에서\n가장 익숙한 감정을 마주합니다.\n\n아무것도 하지 않아도 괜찮은,\n우주라는 공간 속 머물고 싶은 감정을 담았습니다." },

  { number: "15", name: "정진환", img: "images/15_정진환.jpg", video: "images/15_정진환.mp4", highres: "images/15_정진환.jpg",
    title: "홍콩의 환승역",
    medium: "Oil on canvas",
    size: "90.9 × 65.1cm",
    year: "2026",
    desc: "머릿속을 응시하는 한 사람과 그것을 바라보는 다른 공간의 나.\n\n그리고 많은 사람들이 모여 하나의 풍경을 만듭니다. 분광된 빛이 하나의 파장으로 울렸던 찰나의 Hong Kong을 담았습니다." },

  { number: "16", name: "한수연", img: "images/16_한수연.jpg", video: "images/16_한수연.mp4", highres: "images/16_한수연.jpg",
    title: "빛의 유영",
    medium: "Oil on canvas",
    size: "90.9 × 72.7cm",
    year: "2026",
    desc: "햇빛이 잔잔한 물 위에 내려앉아\n보이지 않던 흐름을 드러냅니다.\n\n꽃잎과 물결 사이를 떠도는 빛,\n그리고 유영하는 잉어의 움직임을 통해\n고요한 공간 속 살아 있는 빛을 표현했습니다." },
];

let currentIndex = 0;
let isVideoMode = false;

/* ── 그리드 렌더 ── */
const grid = document.getElementById('artistsGrid');
artists.forEach((a, i) => {
  const wrapper = document.createElement('div');
  wrapper.className = 'artist-wrapper';
  wrapper.innerHTML = `
    <div class="artist-img-wrap">
      <img src="${a.img}" alt="${a.name}" loading="lazy">
    </div>
    <div class="artist-meta">
      <span class="artist-meta-name">${a.name}</span>
      <span class="artist-meta-title">${a.title}</span>
    </div>`;
  wrapper.addEventListener('click', () => openModal(i));
  grid.appendChild(wrapper);
});

/* ── 모달 열기 ── */
function openModal(index) {
  currentIndex = index;
  isVideoMode = false;
  const a = artists[index];

  document.getElementById('modalCounter').textContent = `${String(index+1).padStart(2,'0')} / ${String(artists.length).padStart(2,'0')}`;
  document.getElementById('modalArtistName').textContent = a.name;
  document.getElementById('modalArtworkTitle').textContent = a.title;

  const metaEl = document.getElementById('modalArtworkMeta');
  metaEl.innerHTML = `<span>${a.medium}</span><span>${a.size} ｜ ${a.year}</span>`;

  document.getElementById('modalDesc').textContent = a.desc;
  document.getElementById('modalDownload').href = a.highres || a.img || '#';
  document.getElementById('modalDownload').download = `${a.name}_${a.title}.jpg`;

  const imgEl = document.getElementById('modalImg');
  const vidEl = document.getElementById('modalVideo');
  imgEl.src = a.img;
  imgEl.style.display = 'block';
  vidEl.style.display = 'none';
  vidEl.pause();
  vidEl.src = '';

  const hintEl = document.getElementById('modalVideoHint');
  if (a.video) {
    hintEl.style.display = 'block';
  } else {
    hintEl.style.display = 'none';
  }

  const overlay = document.getElementById('cardOverlay');
  overlay.classList.add('active');
  overlay.scrollTop = 0;
  document.body.style.overflow = 'hidden';
}

/* ── 이미지 클릭 → 영상 전환 ── */
document.getElementById('modalImageWrap').addEventListener('click', () => {
  const a = artists[currentIndex];
  if (!a.video) return;
  const imgEl = document.getElementById('modalImg');
  const vidEl = document.getElementById('modalVideo');
  const loading = document.getElementById('modalLoading');
  const hint = document.getElementById('modalVideoHint');

  if (!isVideoMode) {
  isVideoMode = true;

  document.getElementById('modalImageWrap')
    .classList.add('video-mode');

  imgEl.style.display = 'none';
  loading.style.display = 'flex';
  vidEl.src = a.video;
    vidEl.style.display = 'block';
    vidEl.load();
    vidEl.play().catch(() => {});
    vidEl.oncanplay = () => { loading.style.display = 'none'; };
    hint.style.display = 'none';
  } else {
  isVideoMode = false;

  document.getElementById('modalImageWrap')
    .classList.remove('video-mode');

  vidEl.pause();
  vidEl.src = '';
  vidEl.style.display = 'none';
    imgEl.style.display = 'block';
    loading.style.display = 'none';
    if (a.video) hint.style.display = 'block';
  }
});

/* ── 닫기 ── */
document.getElementById('cardClose').addEventListener('click', closeModal);
document.getElementById('cardOverlay').addEventListener('click', e => {
  if (e.target === document.getElementById('cardOverlay')) closeModal();
});
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

function closeModal() {
  document.getElementById('cardOverlay').classList.remove('active');
  document.body.style.overflow = '';
  const vidEl = document.getElementById('modalVideo');
  vidEl.pause(); vidEl.src = '';
  isVideoMode = false;
}

/* ── 이전/다음 ── */
document.getElementById('cardPrev').addEventListener('click', e => {
  e.stopPropagation();
  openModal((currentIndex - 1 + artists.length) % artists.length);
});
document.getElementById('cardNext').addEventListener('click', e => {
  e.stopPropagation();
  openModal((currentIndex + 1) % artists.length);
});
document.addEventListener('keydown', e => {
  if (!document.getElementById('cardOverlay').classList.contains('active')) return;
  if (e.key === 'ArrowLeft') openModal((currentIndex - 1 + artists.length) % artists.length);
  if (e.key === 'ArrowRight') openModal((currentIndex + 1) % artists.length);
});

/* ── URL 파라미터 자동 열기 ── */
window.addEventListener('load', () => {
  const params = new URLSearchParams(window.location.search);
  const num = params.get('artist');
  if (num) {
    const idx = artists.findIndex(a => a.number === num);
    if (idx !== -1) openModal(idx);
  }
});
</script>
</body>
</html>
