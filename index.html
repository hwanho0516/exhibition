<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>빛의 계절 — 참여 작가</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,700;1,300;1,400&family=Noto+Sans+KR:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #F7F3F0;
    --dark: #72675b;
    --gold: #4b3101;
    --warm: #4b2f08;
    --muted: #6e4c0bbd;
    --light-gold: #D4AF37;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--cream);
    color: var(--dark);
    font-family: 'Noto Serif KR', serif;
    overflow-x: hidden;
  }

  /* ── SIDEBAR ── */
  .sidebar {
    position: fixed;
    left: 0; top: 0;
    width: 56px;
    height: 100vh;
    background: var(--dark);
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .sidebar-text {
    writing-mode: vertical-rl;
    transform: rotate(180deg);
    font-family: 'Cormorant Garamond', serif;
    font-size: 13px;
    letter-spacing: 4px;
    color: var(--gold);
    text-transform: uppercase;
    font-style: italic;
  }


  /* ── ARTISTS GRID ── */
  .section-artists {
    padding: 64px 48px;
  }

  .section-header {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    margin-bottom: 40px;
    text-align: center;
  }

  .section-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 16px;
    letter-spacing: 5px;
    text-transform: uppercase;
    color: var(--muted);
  }
  .section-title-kr {
    font-family: 'Noto Serif KR', serif;
    font-size: 25px;
    font-weight: 300;
    color: var(--dark);
  }

  .artists-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
    background: var(--cream);
    padding: 0 16px;
  }

  .artist-card-footer {
  position: absolute;
  bottom: -36px;   /* 카드 바깥 아래쪽에 위치 */
  left: 0; right: 0;
  text-align: center;
  font-family: 'Noto Serif KR', serif;
  font-size: 13px;
  color: var(--dark);
  padding: 8px 0;
  }

  .artist-card {
    background: var(--cream);
    aspect-ratio: 1/1;
    position: relative;
    overflow: hidden;
    cursor: pointer;
    border-radius: 12px;
  }

  .artist-card img {
    width: 100%; height: 100%;
    object-fit: cover;
    filter: sepia(15%) brightness(0.93);
    transition: filter 0.4s, transform 0.5s;
  }
  .artist-card:hover img {
    filter: sepia(5%) brightness(1);
    transform: scale(1.03);
  }
  .artist-card-placeholder {
    width: 100%; height: 100%;
    background: var(--light-gold);
    display: flex;
    align-items: flex-end;
    padding: 20px;
  }
  .artist-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(to top, rgba(26,23,20,0.72) 0%, transparent 55%);
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    padding: 20px 18px;
    opacity: 0;
    transition: opacity 0.35s;
  }
  .artist-card:hover .artist-overlay { opacity: 1; }
  .artist-name-label {
    display: none;  
    position: absolute;
    bottom: 0; left: 0; right: 0;
    padding: 14px 18px 12px;
    background: linear-gradient(to top, rgba(26,23,20,0.6) 0%, transparent 100%);
  }
  .artist-name {
    font-family: 'Noto Serif KR', serif;
    font-size: 17px;
    font-weight: 400;
    color: #fff;
    letter-spacing: 1px;
  }
  .artist-number {
    font-family: 'Cormorant Garamond', serif;
    font-size: 15px;
    color: var(--gold);
    letter-spacing: 2px;
  }
  .artist-desc-preview {
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 11px;
    color: rgba(245,240,232,0.85);
    line-height: 1.7;
    font-weight: 300;
  }

  /* ── FOOTER ── */
  footer {
    background: var(--dark);
    padding: 24px 48px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .footer-logo {
    font-family: 'Cormorant Garamond', serif;
    font-size: 18px;
    font-style: italic;
    color: var(--gold);
    letter-spacing: 3px;
  }
  .footer-copy {
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 10px;
    color: #4a453e;
    letter-spacing: 1px;
    font-weight: 300;
  }

  /* ── ANIMATIONS ── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(28px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .section-artists { animation: fadeUp 0.8s ease 0.2s both; }

  /* ── 카드 모달 오버레이 ── */
  #cardOverlay {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 999;
    background: rgba(26,23,20,0.88);
    backdrop-filter: blur(8px);
    align-items: center;
    justify-content: center;
    overflow: visible;
  }
  #cardOverlay.active {
    display: flex;
  }

  /* ── 카드 플립 컨테이너 ── */
    .card-scene {
    width: min(360px, 88vw);
    aspect-ratio: 2/3;
    perspective: 1200px;
    cursor: pointer;
    position: relative;
    overflow: visible;
  }

  .card-flip {
    width: 100%;
    height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.75s cubic-bezier(0.4, 0.2, 0.2, 1);
  }
  .card-flip.flipped {
    transform: rotateY(180deg);
  }

  /* 앞면 / 뒷면 공통 */
.card-front,
.card-back {
  position: absolute;
  inset: 0;
  backface-visibility: hidden;
  -webkit-backface-visibility: hidden;
  border-radius: 4px;
  overflow: hidden;
}

/* 뒷면만 따로 */
.card-back {
  background: var(--cream);
  transform: rotateY(180deg);
  display: flex;
  flex-direction: column;
  padding: 0 32px 28px;
  justify-content: space-between;
  overflow-y: auto;
}

  /* ── 앞면: 그림 ── */
  .card-front {
    background: var(--dark);
  }
  .card-front img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    filter: sepia(10%) brightness(0.95);
  }
  /* 앞면 하단 힌트 */
  .card-front-hint {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    padding: 32px 20px 20px;
    background: linear-gradient(to top, rgba(26,23,20,0.82) 0%, transparent 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
  }
  .hint-text {
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 11px;
    color: rgba(245,240,232,0.8);
    letter-spacing: 2px;
    font-weight: 300;
  }
  .hint-arrow {
    display: flex;
    gap: 3px;
  }
  .hint-arrow span {
    width: 5px; height: 5px;
    border-right: 1px solid var(--gold);
    border-bottom: 1px solid var(--gold);
    transform: rotate(-45deg);
    animation: hintPulse 1.4s ease-in-out infinite;
  }
  .hint-arrow span:nth-child(2) { animation-delay: 0.2s; opacity: 0.7; }
  .hint-arrow span:nth-child(3) { animation-delay: 0.4s; opacity: 0.4; }
  @keyframes hintPulse {
    0%, 100% { opacity: 0.3; }
    50%       { opacity: 1; }
  }

  /* 앞면 테두리 장식 */
  .card-front::after {
    content: '';
    position: absolute;
    inset: 10px;
    border: 1px solid rgba(201,169,110,0.3);
    pointer-events: none;
    border-radius: 2px;
  }

.card-back-img {
  width: 100%;
  height: 80px;
  object-fit: cover;
  object-position: center top;
  border-radius: 4px 4px 0 0;
  margin-bottom: 24px;
  filter: sepia(10%) brightness(0.95);
}
  /* 뒷면 상단 장식선 */
  .card-back::before {
    content: '';
    position: absolute;
    inset: 10px;
    border: 1px solid rgba(201,169,110,0.4);
    pointer-events: none;
    border-radius: 2px;
  }

  .card-back-top {
  position: relative;
  flex: 1;
  overflow-y: auto;
}
.card-back-top::after {
  content: '';
  position: sticky;
  bottom: 0;
  display: block;
  height: 40px;
  background: linear-gradient(to bottom, transparent, var(--cream));
  pointer-events: none;
  margin-top: -40px;
}
  .card-back-number {
  display: none;
}
  .card-back-name {
    font-family: 'Noto Serif KR', serif;
    font-size: 24px;
    font-weight: 700;
    color: var(--dark);
    letter-spacing: 2px;
    margin-bottom: 18px;
    word-break: keep-all;
  }
  .card-back-line {
    width: 28px;
    height: 1px;
    background: var(--gold);
    margin-bottom: 18px;
  }
  .card-back-desc {
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 12px;
    color: #5a5550;
    line-height: 2;
    font-weight: 300;
    word-break: keep-all;
  }
  .card-back-download {
    display: flex;
    align-items: center;
    gap: 10px;
    border: 1px solid var(--gold);
    padding: 12px 18px;
    text-decoration: none;
    color: var(--dark);
    font-family: 'Cormorant Garamond', serif;
    font-size: 12px;
    letter-spacing: 2px;
    text-transform: uppercase;
    transition: background 0.25s, color 0.25s;
    margin-top: 20px;
    justify-content: center;
    flex-shrink: 0;
  }
  .card-back-download:hover {
    background: var(--gold);
    color: #fff;
  }

  /* 닫기 버튼 */
  #cardClose {
    position: absolute;
    top: -44px;
    right: 0;
    background: none;
    border: none;
    color: rgba(245,240,232,0.7);
    font-size: 28px;
    cursor: pointer;
    font-family: 'Cormorant Garamond', serif;
    line-height: 1;
    transition: color 0.2s;
  }
  #cardClose:hover { color: var(--gold); }

  .card-back-top.scrolled-bottom::after {
    opacity: 0;
    transition: opacity 0.3s;
  }
  .card-back-top::after {
    transition: opacity 0.3s;
  }
  .section-divider {
    width: 120px;
    height: 1px;
    background: var(--muted);
    margin-bottom: 8px;
  }

  .card-loading {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  background: rgba(26,23,20,0.6);
  z-index: 10;
  border-radius: 4px;
}
.card-loading-text {
  font-family: 'Noto Sans KR', sans-serif;
  font-size: 12px;
  color: rgba(245,240,232,0.8);
  letter-spacing: 3px;
  font-weight: 300;
  animation: hintPulse 1s ease-in-out infinite;
}

.card-hint-below .hint-text {
  font-family: 'Noto Sans KR', sans-serif;
  font-size: 11px;
  color: rgba(245,240,232,0.7);
  letter-spacing: 1px;
  font-weight: 300;
}

#cardPrev, #cardNext {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  background: none;
  border: none;
  color: rgba(245,240,232,0.7);
  font-size: 56px;
  cursor: pointer;
  font-family: 'Cormorant Garamond', serif;
  line-height: 1;
  transition: color 0.2s;
  z-index: 1000;
  padding: 0 16px;
}
#cardPrev { left: -30px; }
#cardNext { right: -30px; }
#cardPrev:hover, #cardNext:hover { color: var(--light-gold); }

  /* ── PC 반응형 ── */
  @media (max-width: 900px) {
  .artists-grid { grid-template-columns: repeat(2, 1fr); }
}
@media (max-width: 600px) {
  .artists-grid { grid-template-columns: repeat(2, 1fr); }
}

  /* ── 모바일 반응형 ── */
  @media (max-width: 600px) {
    .artists-grid { grid-template-columns: repeat(2, 1fr); }
    .section-artists { padding: 30px 20px; }
    .section-header { flex-direction: column; gap: 6px; }
    .section-title { font-size: 9px; }
    .section-title-kr { font-size: 16px; white-space: nowrap; }
    .artist-name { font-size: 11px; }
    .artist-number { font-size: 9px; }
    .footer-logo { font-size: 14px; }
    .footer-copy { font-size: 9px; }
    footer { padding: 20px; }

    .card-back {
      padding: 28px 24px 22px;
    }
    .card-back-name { font-size: 18px; }
    .card-back-desc { font-size: 11px; }
  }
</style>
</head>
<body>


<main>
  <section class="section-artists">
    <div class="section-header">
  <span class="section-title-kr">빛의 계절</span>
  <div class="section-divider"></div>
  <span class="section-title">작품을 클릭하면 작품설명을 볼 수 있습니다</span>
</div>
    <div class="artists-grid" id="artistsGrid"></div>
  </section>

  <footer>
    <span class="footer-logo">빛의 계절</span>
    <span class="footer-copy">Season of Light — 16 Artists Group Exhibition</span>
  </footer>
</main>



<!-- 카드 모달 -->
<div id="cardOverlay">
  <div class="card-scene" id="cardScene">
    <button id="cardClose">✕</button>
    <button id="cardPrev">&#8249;</button>
    <button id="cardNext">&#8250;</button>
    <div class="card-flip" id="cardFlip">

  <!-- 앞면 -->
  <div class="card-front" id="cardFront">
  <img id="cardImg" src="" alt="">
  <div class="card-loading" id="cardLoading" style="display:none;">
    <span class="card-loading-text">로딩 중</span>
  </div>
</div>

  <!-- 뒷면 -->
  <div class="card-back" id="cardBack">
          <img class="card-back-img" id="cardBackImg" src="" alt="">
          <div class="card-back-top">
          <div class="card-back-number" id="cardNumber"></div>
          <div class="card-back-name" id="cardName"></div>
          <div class="card-back-line"></div>
          <div class="card-back-desc" id="cardDesc"></div>
        </div>
        <a class="card-back-download" id="cardDownload" href="#" download>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
            <polyline points="7 10 12 15 17 10"/>
            <line x1="12" y1="15" x2="12" y2="3"/>
          </svg>
          고화질 이미지 다운로드
        </a>
      </div>

    </div><!-- .card-flip -->
    <div class="card-hint-below">
      <span class="hint-text">클릭하면 영상을 볼 수 있습니다</span>
    </div>
  </div><!-- .card-scene -->
</div><!-- #cardOverlay -->

<script>
const artists = [
  { number: "01", name: "강미혜", img: "images/01_강미혜.jpg", video: "images/01_강미혜.mp4", highres: "images/01_강미혜.jpg", desc: "란몽(烂夢)\nOil on canvas\n20호 P (72.7×53.0cm)\n2026\n\n작품 제목인 '란몽'은 캘리그라퍼인 제 필명으로, '빛나는 꿈'이라는 의미를 담고 있습니다.\nAlmond Blossoms의 아몬드나무를 오마주하여 표현했으며, 나뭇가지는 꿈 몽(夢) 자로 그리고 꽃들로 빛을 채워 '빛나는 꿈'을 형상화했습니다." },
  { number: "02", name: "구본우", img: "images/02_구본우.jpg", video: "images/02_구본우.mp4", highres: "images/02_구본우.jpg", desc: "피렌체의 저녁\n색연필화\n10호\n2026\n\n이탈리아 여행의 기억 속, 고풍스러운 성당과 현대적인 전차가 교차하는 도시의 황혼을 표현했습니다.\n층층이 쌓인 색연필의 결을 통해 일상적인 풍경에 서정적인 온기를 담았습니다." },
  { number: "03", name: "김병희", img: "images/panda.jpg", video: "images/03_김병희.mp4", highres: "images/03_김병희.jpg", desc: "꽃속의 자아\nOil on canvas\n30호 F (90.9×72.7cm)\n2026\n\n두 얼굴을 통해 현실과 내면의 자아를 표현하고, 꽃으로 그 변화와 생명력을 담았습니다." },
  { number: "04", name: "김예리", img: "images/panda.jpg", video: "images/04_김예리.mp4", highres: "images/04_김예리.jpg", desc: "요트 위에서\nOil on canvas\n20호 P (72.7×53.0cm)\n2026\n\n투명하게 빛나는 윤슬과 에메랄드빛 바다의 고요함을 배경으로 멀찌감치 수면을 가르는 보트의 움직임이 활기를 불어넣고, 짙은 사이프러스 나무 사이로 시원한 바람이 느껴집니다.\n빛과 물이 만들어내는 청량한 순간을 담아내고 싶었습니다." },
  { number: "05", name: "마환호", img: "images/01_마환호.jpg", video: "images/01_마환호.mp4", highres: "images/05_마환호.jpg", desc: "69.65°N\nOil on canvas\n30호 F (90.9×72.7cm)\n2026\n\n노르웨이 트롬쇠의 겨울, 오로라가 흐르는 하늘 아래 작은 도서관 하나가 불을 밝히고 있습니다.\n차가운 극야의 하늘과 도서관 통유리 너머로 새어 나오는 노란 빛의 대비 속에서, 일상으로부터 멀어진 고요함을 담았습니다." },
  { number: "06", name: "박수연", img: "images/panda.jpg", video: "images/06_박수연.mp4", highres: "images/06_박수연.jpg", desc: "달빛 풍경\nOil on canvas\n72.5×45cm\n2026\n\n단 하나의 달빛 아래, 저마다의 이야기를 품은 빛들이 공존하는 공간을 표현했습니다.\n겹겹이 쌓아 올린 터치와 무르익은 색채를 통해, 개개인의 다양성이 유기적으로 조화를 이루는 삶의 풍경을 담아냈습니다." },
  { number: "07", name: "박준형", img: "images/panda.jpg", video: "images/07_박준형.mp4", highres: "images/07_박준형.jpg", desc: "Beyond the Signal\nOil on canvas / AI Collaboration\n12호 P (60.6×45.5cm), 2pieces\n2026\n\n두 작품은 AI와의 대화를 통해 탄생한 결과물로, 하나의 바다를 서로 다른 시각과 감정으로 표현합니다.\n밝은 작품은 가능성과 희망을, 어두운 작품은 혼란과 표류를 상징합니다.\n두 작품 중심에 존재하는 빛은 우리가 그 사이 어딘가에 서 있음을 보여줍니다." },
  { number: "08", name: "백소영", img: "images/panda.jpg", video: "images/08_백소영.mp4", highres: "images/08_백소영.jpg", desc: "다섯개의 창, 하나의 계절\nOil on canvas\n4호 (33.3×21.2cm)\n4호 (33.3×24.2cm), 2pieces\n1호 (22.5×14.0cm)\n2026\n\n서로 다른 색의 벽과 창, 그리고 꽃들은 각자의 시간과 감정을 머금은 채 하나의 풍경으로 이어집니다.\n입체적으로 확장된 경계는 빛이 머무는 순간을 붙잡아 우리를 고요한 계절로 이끕니다." },

const overlay  = document.getElementById('cardOverlay');
const cardFlip = document.getElementById('cardFlip');
const cardClose = document.getElementById('cardClose');

let currentIndex = 0;

function openCard(a, index) {
  currentIndex = index ?? artists.findIndex(x => x.number === a.number);
  const cardImgEl = document.getElementById('cardImg');
if (a.video) {
  cardImgEl.style.display = 'none';
  let vid = document.getElementById('cardVideo');
  if (!vid) {
    vid = document.createElement('video');
    vid.id = 'cardVideo';
    vid.autoplay = true; vid.loop = true; vid.muted = true; vid.playsInline = true;
    vid.style.cssText = 'width:100%;height:100%;object-fit:cover;position:absolute;inset:0;';
    document.getElementById('cardFront').appendChild(vid);
  }
  vid.src = a.video;
  vid.style.display = 'block';
  document.getElementById('cardLoading').style.display = 'flex';
  vid.load();
  vid.play().catch(() => {});
  vid.oncanplay = () => {
    document.getElementById('cardLoading').style.display = 'none';
  };
} else {
  cardImgEl.style.display = 'block';
  cardImgEl.src = a.img || '';
  const vid = document.getElementById('cardVideo');
  if (vid) vid.style.display = 'none';
}
  document.getElementById('cardBackImg').src = a.img || '';
  document.getElementById('cardImg').alt      = a.name;
  document.getElementById('cardNumber').textContent = `No. ${a.number}`;
  document.getElementById('cardName').textContent   = a.name;
    const descLines = a.desc.split('\n');
    const title = descLines[0];
    const rest = descLines.slice(1).join('\n');
    document.getElementById('cardDesc').innerHTML = 
      `<span style="font-weight:700; color:var(--dark); font-size:18px;">${title}</span><br>` +
      rest.replace(/\. /g, '.<br>').replace(/\n/g, '<br>');
  document.getElementById('cardDownload').href      = a.highres || a.img || '#';
  document.getElementById('cardDownload').download  = `${a.name}_작품.jpg`;

  cardFlip.classList.add('flipped');
  overlay.classList.add('active');
  document.body.style.overflow = 'hidden';
  document.querySelector('.card-hint-below').style.visibility = 'hidden';
  const backTop = document.querySelector('.card-back-top');
  if (backTop) {
    backTop.scrollTop = 0;
    backTop.classList.remove('scrolled-bottom');
    setTimeout(() => {
      if (backTop.scrollHeight <= backTop.clientHeight) {
        backTop.classList.add('scrolled-bottom');
      }
    }, 100);
  }
}

// 카드 씬 클릭 → 플립 (다운로드 버튼은 제외)
document.getElementById('cardScene').addEventListener('click', function(e) {
  if (e.target.closest('#cardDownload')) return;
  cardFlip.classList.toggle('flipped');
  const hint = document.querySelector('.card-hint-below');
  if (cardFlip.classList.contains('flipped')) {
    hint.style.visibility = 'hidden';
  } else {
    hint.style.visibility = 'visible';
  }
  }
});

document.querySelector('.card-back-top').addEventListener('scroll', function() {
  const el = this;
  const isAtBottom = el.scrollHeight - el.scrollTop <= el.clientHeight + 5;
  if (isAtBottom) {
    el.classList.add('scrolled-bottom');
  } else {
    el.classList.remove('scrolled-bottom');
  }
});

// 닫기
cardClose.addEventListener('click', function(e) {
  e.stopPropagation();
  overlay.classList.remove('active');
  document.body.style.overflow = '';
});

// 배경 클릭 시 닫기
overlay.addEventListener('click', function(e) {
  if (e.target === overlay) {
    overlay.classList.remove('active');
    document.body.style.overflow = '';
  }
});

// ESC 닫기
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    overlay.classList.remove('active');
    document.body.style.overflow = '';
  }
});

// URL 파라미터로 작가 카드 자동 열기
window.addEventListener('load', () => {
  const params = new URLSearchParams(window.location.search);
  const artistNum = params.get('artist');
  if (artistNum) {
    const artist = artists.find(a => a.number === artistNum);
    if (artist) openCard(artist, artists.indexOf(artist));
  }
});

// ── 카드 그리드 렌더링 ──
const grid = document.getElementById('artistsGrid');
artists.forEach(a => {
  const mediaHtml = a.img
  ? `<img src="${a.img}" alt="${a.name}">`
  : `<div class="artist-card-placeholder"></div>`;

  const wrapper = document.createElement('div');
  wrapper.style.cssText = 'display:flex; flex-direction:column; background:var(--cream);';

  const card = document.createElement('div');
  card.className = 'artist-card';
  card.innerHTML = `
    ${mediaHtml}
    <div class="artist-overlay">
      <div class="artist-name" style="font-size:15px;margin-bottom:6px">${a.name}</div>
      <div class="artist-desc-preview">${a.desc.slice(0, 30)}...</div>
    </div>`;
  card.onclick = () => openCard(a, artists.indexOf(a));

  const nameLabel = document.createElement('div');
  nameLabel.style.cssText = 'text-align:center; padding:10px 0 14px; font-family:"Noto Serif KR",serif; font-size:15px; color:#72675b;';
  nameLabel.textContent = a.name;

  wrapper.appendChild(card);
  wrapper.appendChild(nameLabel);
  grid.appendChild(wrapper);
});

document.getElementById('cardPrev').addEventListener('click', function(e) {
  e.stopPropagation();
  currentIndex = (currentIndex - 1 + artists.length) % artists.length;
  cardFlip.classList.remove('flipped');
  openCard(artists[currentIndex], currentIndex);
});

document.getElementById('cardNext').addEventListener('click', function(e) {
  e.stopPropagation();
  currentIndex = (currentIndex + 1) % artists.length;
  cardFlip.classList.remove('flipped');
  openCard(artists[currentIndex], currentIndex);
});

</script>
</body>
</html>
